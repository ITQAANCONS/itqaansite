<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" font-family="Tajawal, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f93cc"/><stop offset="1" stop-color="#27abe3"/>
    </linearGradient>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="2" fill="rgba(255,255,255,.18)"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#dots)"/>
  <circle cx="650" cy="120" r="160" fill="rgba(255,255,255,.08)"/>
  <circle cx="120" cy="500" r="120" fill="rgba(255,255,255,.06)"/>
  <text x="60" y="300" fill="#ffffff" font-size="92" font-weight="800" opacity=".95">Smart Retail</text>
  <text x="62" y="360" fill="#ffffff" font-size="30" font-weight="500" opacity=".8">E-Commerce</text>
</svg>
